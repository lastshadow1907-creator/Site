<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonsuza Dek Biz ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root { --kalp-kirmizi: #ff4d6d; --vurgu-sarisi: #fec10d; --ana-mavi: #002d72; }
        body { font-family: 'Poppins', sans-serif; background: #fff0f3; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Sayaç Kutusu */
        .sayaç-karti { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 30px; border-radius: 30px; 
            text-align: center; border: 4px solid var(--vurgu-sarisi);
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.2);
            width: 320px; margin: 20px 0;
        }
        #gun-sayisi { font-size: 3.5rem; font-weight: 800; color: var(--kalp-kirmizi); display: block; }
        #saat-alani { font-size: 1.5rem; font-weight: 600; color: var(--ana-mavi); letter-spacing: 2px; }

        /* Fotoğraflar */
        .album { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin: 20px 0; }
        .polaroid { background: white; padding: 10px 10px 25px 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 130px; transform: rotate(-2deg); }
        .polaroid img { width: 100%; height: 120px; object-fit: cover; }

        /* Butonlar */
        .kalp-butonu { font-size: 5rem; background: none; border: none; cursor: pointer; }
        .yukle-vurgu { position: fixed; bottom: 20px; right: 20px; background: var(--kalp-kirmizi); color: white; width: 60px; height: 60px; border-radius: 50%; border: 3px solid white; font-size: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <h1 style="font-family: 'Pacifico'; color: var(--kalp-kirmizi);">Bizim Hikayemiz</h1>

    <div class="sayaç-karti">
        <span id="gun-sayisi">Yükleniyor...</span>
        <span id="saat-alani">00 : 00 : 00</span>
    </div>

    <div id="resimler" class="album"></div>

    <button onclick="kalpGonder()" class="kalp-butonu">❤️</button>
    <div id="uyari" style="color: var(--kalp-kirmizi); font-weight: bold; height: 20px;"></div>

    <button class="yukle-vurgu" onclick="document.getElementById('gizliSecici').click()">+</button>
    <input type="file" id="gizliSecici" style="display: none;" accept="image/*" onchange="resimYukle(event)">

    <script>
        const API_KEY = '5767fb3279ed0b1f20bf5beab37300d4';
        const baslangic = new Date("2026-03-14T00:08:00"); 

        // SAYAÇ - KESİN ÇALIŞAN MANTIK
        function sayaciGuncelle() {
            const simdi = new Date();
            const farkMs = simdi - baslangic;
            
            const toplamSaniye = Math.floor(farkMs / 1000);
            const gun = Math.floor(toplamSaniye / 86400);
            const saat = Math.floor((toplamSaniye % 86400) / 3600);
            const dakika = Math.floor((toplamSaniye % 3600) / 60);
            const saniye = toplamSaniye % 60;

            document.getElementById('gun-sayisi').innerText = gun + " GÜN";
            document.getElementById('saat-alani').innerText = 
                `${String(saat).padStart(2,'0')} : ${String(dakika).padStart(2,'0')} : ${String(saniye).padStart(2,'0')}`;
        }
        setInterval(sayaciGuncelle, 1000);
        sayaciGuncelle();

        // RESİM YÜKLEME VE HAFIZA
        window.onload = () => {
            const kayıtlılar = JSON.parse(localStorage.getItem('fotolar') || '[]');
            kayıtlılar.forEach(url => ekranaBas(url));
        };

        async function resimYukle(e) {
            const dosya = e.target.files[0];
            if(!dosya) return;
            
            const form = new FormData();
            form.append('image', dosya);
            
            document.getElementById('uyari').innerText = "Yükleniyor... ✨";

            try {
                const yanit = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, { method: 'POST', body: form });
                const veri = await yanit.json();
                if(veri.success) {
                    const url = veri.data.url;
                    ekranaBas(url);
                    // Hafızaya ekle
                    const liste = JSON.parse(localStorage.getItem('fotolar') || '[]');
                    liste.push(url);
                    localStorage.setItem('fotolar', JSON.stringify(liste));
                    document.getElementById('uyari').innerText = "Eklendi! ❤️";
                }
            } catch(hata) { document.getElementById('uyari').innerText = "Hata!"; }
        }

        function ekranaBas(url) {
            const div = document.createElement('div');
            div.className = 'polaroid';
            div.innerHTML = `<img src="${url}">`;
            document.getElementById('resimler').prepend(div);
        }

        function kalpGonder() {
            fetch(`https://api.telegram.org/bot8679884252:AAExbOnyIg_MNFv00NRnW79-vtlH5KB6j0w/sendMessage?chat_id=6555602691&text=Sana bir kalp geldi! ❤️`);
            document.getElementById('uyari').innerText = "Kalbini aldı! ❤️";
            setTimeout(() => document.getElementById('uyari').innerText = "", 3000);
        }
    </script>
</body>
</html>
