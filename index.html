<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muly ❤️ Olcay</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Pacifico&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <script async src="https://imgbb.com/upload.js"></script>

    <style>
        :root { 
            --ana: #5d7fb9; 
            --bg: #e9f1fa; 
            --card: rgba(255, 255, 255, 0.9); 
            --text: #333; 
            --neon: #ff4757;
            --shadow: rgba(0,0,0,0.1);
        }

        body.night {
            --bg: #1a1a2e;
            --card: rgba(26, 26, 46, 0.85);
            --text: #f1f2f6;
            --ana: #a29bfe;
            --shadow: rgba(0,0,0,0.5);
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            color: var(--text); 
            transition: background 1.5s ease, color 1.5s ease; 
            overflow-x: hidden; 
            padding-bottom: 180px;
            position: relative;
        }

        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .sayaç-ust-yazi { font-family: 'Dancing Script', cursive; font-size: 1.6rem; color: #b02a3a; margin-bottom: 5px; }
        .neon-inf { font-size: 3.5rem; color: var(--neon); text-shadow: 0 0 15px var(--neon); animation: pulse 2s infinite; display: block; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        
        .card { 
            background: var(--card); 
            width: 92%; 
            max-width: 380px; 
            border-radius: 35px; 
            padding: 25px 15px; 
            text-align: center; 
            box-shadow: 0 12px 30px var(--shadow); 
            border: 1px solid rgba(255,255,255,0.1); 
            backdrop-filter: blur(15px); 
            margin-top: 5px; 
            transition: background 1s;
        }

        #gun { font-size: 3.2rem; font-weight: 800; color: #b02a3a; line-height: 1; }
        #saat { font-size: 1.8rem; font-weight: 600; color: var(--ana); letter-spacing: 1px; }

        .progress-container { width: 85%; margin: 15px auto 0; text-align: left; }
        .progress-bar-bg { background: rgba(0,0,0,0.1); height: 12px; border-radius: 10px; overflow: hidden; position: relative; }
        .progress-fill { background: linear-gradient(90deg, var(--ana), #b02a3a); height: 100%; transition: width 1s ease-in-out; border-radius: 10px; width: 0%; }
        .progress-text { font-size: 0.75rem; font-weight: 600; color: var(--text); opacity: 0.7; margin-top: 5px; display: flex; justify-content: space-between; }

        .game-box { background: var(--card); width: 92%; max-width: 380px; border-radius: 25px; padding: 20px; text-align: center; margin-top: 20px; border: 2px dashed var(--ana); box-sizing: border-box; }
        .game-btn { background: var(--ana); color: white; border: none; padding: 12px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }

        .tabs { display: flex; background: var(--card); border-radius: 20px; margin: 20px 0; width: 92%; max-width: 380px; overflow: hidden; padding: 5px; box-sizing: border-box; }
        .tab { flex: 1; padding: 12px; border: none; background: none; font-weight: 700; color: var(--ana); cursor: pointer; border-radius: 15px; transition: 0.3s; }
        .tab.active { background: var(--ana); color: white; }
        
        .pol { 
            background: white; 
            padding: 8px 8px 25px 8px; 
            border-radius: 2px; 
            width: 105px; 
            box-shadow: 3px 5px 15px rgba(0,0,0,0.15); 
            transition: transform 0.3s ease; 
            position: relative; 
            margin-bottom: 15px; 
        }
        .pol img { width: 100%; height: 100px; object-fit: cover; border-radius: 2px; }

        .ani-card { background: var(--card); margin: 10px; padding: 15px; border-radius: 20px; width: 85%; border-left: 5px solid #b02a3a; text-align: left; position: relative; }
        .del-btn { position: absolute; top: -8px; right: -8px; background: #ff4757; color: white; border-radius: 50%; width: 24px; height: 24px; border: 2px solid white; cursor: pointer; z-index: 10; font-weight: bold; }

        .kalpler { display: flex; gap: 40px; margin: 25px 0; }
        .k-btn { background: none; border: none; cursor: pointer; font-size: 3.5rem; transition: 0.3s; padding: 0; filter: drop-shadow(0 0 5px rgba(0,0,0,0.2)); }

        .hand-hold-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 100px; background: linear-gradient(transparent, var(--card)); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; backdrop-filter: blur(5px); }
        .touch-heart { font-size: 3rem; cursor: pointer; transition: 0.5s; filter: grayscale(1); user-select: none; }
        .touch-heart.active { filter: grayscale(0) drop-shadow(0 0 20px #ff4757); transform: scale(1.3); }

        .ani-panel { position: fixed; bottom: 110px; right: 20px; z-index: 1000; }
        .ani-btn { background: #b02a3a; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); border: 2px solid white; cursor: pointer; }
        .ani-menu { display: none; background: var(--card); border-radius: 20px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 180px; position: absolute; bottom: 70px; right: 0; flex-direction: column; gap: 8px; backdrop-filter: blur(10px); }
        .ani-menu-item { background: rgba(93, 127, 185, 0.1); color: var(--ana); border: none; padding: 10px; border-radius: 10px; font-weight: 600; cursor: pointer; text-align: left; }

        .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .popup-box { background: var(--card); width: 85%; max-width: 320px; border-radius: 25px; padding: 25px; text-align: center; }
        #ani-input { width: 100%; height: 100px; border-radius: 10px; padding: 10px; margin: 10px 0; border: 1.5px solid var(--ana); box-sizing: border-box; background: rgba(255,255,255,0.1); color: var(--text); }
        #loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); color:white; z-index:3000; align-items:center; justify-content:center; }
    </style>
</head>
<body id="mainBody">

    <div class="stars-container" id="stars"></div>
    <div id="loading-overlay">🚀 Büyü Hazırlanıyor...</div>

    <h1 style="font-family:'Pacifico'; color:#b02a3a; margin:10px 0; text-align: center;">İyi ki Varsın...</h1>

    <div class="sayaç-ust-yazi">Seni Seviyorum Muly...</div>
    <div class="card">
        <span class="neon-inf">♾️</span>
        <div id="gun">...</div>
        <div id="saat">00 : 00 : 00</div>
        
        <div class="progress-container">
            <div class="progress-bar-bg">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div class="progress-text">
                <span id="targetLabel">Aşk Yolculuğumuz</span>
                <span id="percentLabel">%0</span>
            </div>
        </div>
    </div>

    <div class="game-box">
        <div style="font-size: 0.8rem; color: var(--ana); font-weight: 600;">✨ Muly'ye Özel Görev Kutusu ✨</div>
        <div id="task-display" style="font-family: 'Dancing Script'; font-size: 1.5rem; color: #b02a3a; margin-top: 10px;">Hediyeni Çek 🎁</div>
        <div id="timer-display" style="font-size: 0.85rem; color: #b02a3a; margin-top: 5px; font-weight: bold;"></div>
        <button id="draw-btn" class="game-btn" onclick="getTask()">Görevi Çek</button>
    </div>

    <div class="tabs">
        <button id="t1" class="tab active" onclick="tab('g')">🖼️ Galeri</button>
        <button id="t2" class="tab" onclick="tab('a')">✍️ Anılar</button>
    </div>

    <div id="gs" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 100%;"></div>
    <div id="as" style="display:none; width:100%; flex-direction:column; align-items:center;"></div>

    <div class="kalpler">
        <div style="text-align: center;"><button onclick="at('M')" class="k-btn">💖</button></div>
        <div style="text-align: center;"><button onclick="at('O')" class="k-btn">💝</button></div>
    </div>
    <div id="not" style="font-size:1rem; font-weight:bold; color:#ff4757; height:25px; text-align: center;"></div>

    <div class="hand-hold-container">
        <div id="touchHeart" class="touch-heart" onmousedown="startTouch()" onmouseup="endTouch()" ontouchstart="startTouch()" ontouchend="endTouch()">❤️</div>
        <div style="font-size: 0.75rem; font-weight: bold; color: var(--ana); margin-top: 5px;">Dokun ve hisset...</div>
    </div>

    <div class="ani-panel">
        <div id="aniMenu" class="ani-menu">
            <button class="ani-menu-item" data-imgbb-active="true" onclick="toggleAniMenu()">📸 Fotoğraf Gönder</button>
            <button class="ani-menu-item" onclick="openText()">✍️ Anı Yaz</button>
        </div>
        <div class="ani-btn" onclick="toggleAniMenu()">➕</div>
    </div>

    <div id="popupOverlay" class="popup-overlay">
        <div class="popup-box">
            <h3 style="margin:0; color:var(--ana)">Anı Defterimiz ✨</h3>
            <textarea id="ani-input" placeholder="Kalbimizden geçenleri yazalım..."></textarea>
            <button class="game-btn" style="background:#b02a3a" onclick="saveTextAni()">Sonsuza Kaydet ✅</button>
            <button class="game-btn" style="background:#ccc; color:#333; margin-top:5px;" onclick="closePopup()">Kapat</button>
        </div>
    </div>

    <script>
        const T = '8679884252:AAExbOnyIg_MNFv00NRnW79-vtlH5KB6j0w';
        const M = '8697863466'; 
        const O = '6555602691'; 
        const S = '1JgcElY-IQEvViAZjivDtZPhzDJqE6kwetokPrnR-Kjk';
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbwi-0o6xAFHr8DlkR6BWPYiA9bDK2ecghWt_uUdvBsazcdVzU9BoNtLafblCXK27ZjTKA/exec';
        const start = new Date(2026, 2, 14, 0, 8, 0);

        function checkTheme() {
            const hour = new Date().getHours();
            const body = document.getElementById('mainBody');
            if (hour >= 20 || hour < 8) body.classList.add('night');
            else body.classList.remove('night');
        }

        function createStars() {
            const container = document.getElementById('stars');
            container.innerHTML = '';
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1 + 'px';
                star.style.width = size; star.style.height = size;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }

        async function saveTextAni() {
            const txt = document.getElementById('ani-input').value.trim();
            if(!txt) return;
            document.getElementById('loading-overlay').style.display = 'flex';
            await fetch(`${scriptUrl}?ani=${encodeURIComponent(txt)}&foto=`, { mode: 'no-cors' });
            document.getElementById('ani-input').value = "";
            closePopup(); load();
            sendTele("✍️ Muly anı defterimize yeni bir not bıraktı!", O);
            document.getElementById('loading-overlay').style.display = 'none';
        }

        async function load() {
            try {
                const r = await fetch(`https://docs.google.com/spreadsheets/d/${S}/gviz/tq?tqx=out:csv&v=${Math.random()}`);
                const csv = await r.text();
                const lines = csv.split('\n').slice(1);
                const g = document.getElementById('gs'), a = document.getElementById('as');
                g.innerHTML = ""; a.innerHTML = "";
                lines.forEach((l, index) => {
                    const lineId = index + 2; 
                    const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    let txt = c[0]?.replace(/"/g,''), img = c[1]?.replace(/"/g,'');
                    if(img?.includes('http')) {
                        g.insertAdjacentHTML('afterbegin', `<div class="pol"><button class="del-btn" onclick="delAni(${lineId})">×</button><img src="${img}"></div>`);
                    }
                    if(txt && !txt.includes('http')) {
                        a.insertAdjacentHTML('afterbegin', `<div class="ani-card"><button class="del-btn" onclick="delAni(${lineId})">×</button>${txt}</div>`);
                    }
                });
            } catch (e) {}
        }

        async function delAni(id) {
            if(!confirm("Silmek istediğine emin misin?")) return;
            document.getElementById('loading-overlay').style.display = 'flex';
            await fetch(`${scriptUrl}?del=${id}`, { mode: 'no-cors' });
            setTimeout(() => { load(); document.getElementById('loading-overlay').style.display = 'none'; }, 1500);
        }

        function at(k) {
            if (k === 'M') sendTele("Muly seni çok özledi ve kalp gönderdi ❤️", O);
            else sendTele("Olcay seni düşünüyor ve kalp gönderdi 💝", M);
            document.getElementById('not').innerText = "Sevgi iletildi! ✨";
            setTimeout(()=>document.getElementById('not').innerText="", 2000);
        }

        function count() {
            const now = new Date();
            const f = now - start;
            const d = Math.floor(f/86400000);
            const h = Math.floor((f%86400000)/3600000), m = Math.floor((f%3600000)/60000), s = Math.floor((f%60000)/1000);
            document.getElementById('gun').innerText = d + " GÜN";
            document.getElementById('saat').innerText = `${String(h).padStart(2,'0')} : ${String(m).padStart(2,'0')} : ${String(s).padStart(2,'0')}`;
            let target = 365;
            const percent = Math.min((d / target) * 100, 100).toFixed(1);
            document.getElementById('progressFill').style.width = percent + "%";
            document.getElementById('percentLabel').innerText = "%" + percent;
        }

        function getTask() {
            const now = Date.now();
            if (now - (localStorage.getItem('last_task') || 0) < 10800000) return;
            const ts = ["Ses at ve seni seviyorum de 🎙️", "Bir selfie gönder 📸", "En çok beni sevdiğini söyleyen ses at 💝"];
            const task = ts[Math.floor(Math.random() * ts.length)];
            document.getElementById('task-display').innerText = task;
            localStorage.setItem('last_task', now);
            updateCooldown();
            sendTele("🔔 Görev seçildi: " + task, O);
        }

        function updateCooldown() {
            const last = localStorage.getItem('last_task') || 0;
            const remain = 10800000 - (Date.now() - last);
            const btn = document.getElementById('draw-btn');
            if (remain > 0) {
                btn.disabled = true;
                const h = Math.floor(remain/3600000), m = Math.floor((remain%3600000)/60000);
                document.getElementById('timer-display').innerText = `Bekleme: ${h}s ${m}d`;
                setTimeout(updateCooldown, 10000);
            } else { btn.disabled = false; document.getElementById('timer-display').innerText = "Hediye Hazır!"; }
        }

        let touchTimeout;
        function startTouch() {
            document.getElementById('touchHeart').classList.add('active');
            touchTimeout = setTimeout(() => sendTele("🤝 Muly senin için kalbe dokunuyor...", O), 2000);
        }
        function endTouch() {
            clearTimeout(touchTimeout);
            document.getElementById('touchHeart').classList.remove('active');
        }

        function toggleAniMenu() { const m = document.getElementById('aniMenu'); m.style.display = (m.style.display === 'flex' ? 'none' : 'flex'); }
        function openText() { document.getElementById('popupOverlay').style.display = 'flex'; toggleAniMenu(); }
        function closePopup() { document.getElementById('popupOverlay').style.display = 'none'; }
        function tab(x) {
            document.getElementById('gs').style.display = x==='g'?'flex':'none';
            document.getElementById('as').style.display = x==='a'?'flex':'none';
            document.getElementById('t1').classList.toggle('active', x==='g');
            document.getElementById('t2').classList.toggle('active', x==='a');
        }
        function sendTele(msg, target) { fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${target}&text=${encodeURIComponent(msg)}`); }

        window.onload = () => { load(); count(); updateCooldown(); checkTheme(); createStars(); };
        setInterval(count, 1000);
    </script>
</body>
</html>
