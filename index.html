<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muly ❤️ Olcay</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Pacifico&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ana: #ff758c; --bg: linear-gradient(180deg, #ff7e5f 0%, #feb47b 50%, #ff7eb3 100%); --card: rgba(255, 255, 255, 0.85); --text: #4a4a4a; --red: #d63031; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            background-attachment: fixed;
            margin: 0; padding: 15px; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; color: var(--text); padding-bottom: 80px; 
        }

        .card { background: var(--card); width: 92%; max-width: 380px; border-radius: 35px; padding: 25px 15px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-top: 10px; backdrop-filter: blur(5px); }
        #gun { font-size: 3.5rem; font-weight: 800; color: var(--red); line-height: 1; margin-bottom: 5px; }
        #saat { font-size: 1.8rem; font-weight: 600; color: #6c5ce7; letter-spacing: 1px; }
        .quote { font-family: 'Dancing Script', cursive; font-size: 1.3rem; color: #444; margin-top: 10px; font-weight: bold; }

        .kalpler { display: flex; gap: 50px; margin: 25px 0; justify-content: center; }
        .k-btn { background: none; border: none; cursor: pointer; font-size: 3.8rem; transition: 0.3s; padding: 0; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        .k-btn:active { transform: scale(1.2); }
        .k-label { font-size: 1.2rem; font-weight: 800; color: var(--red); font-family: 'Dancing Script', cursive; margin-top: 5px; }

        .game-box { background: var(--card); width: 92%; max-width: 380px; border-radius: 25px; padding: 20px; text-align: center; margin-top: 20px; border: 2px dashed #ff758c; backdrop-filter: blur(5px); }
        #task-display { font-family: 'Poppins'; font-weight: 600; color: var(--red); margin-bottom: 10px; font-size: 1.1rem; }
        #task-timer { font-size: 1.2rem; font-weight: bold; color: #ff4757; display: none; margin-top: 5px; }
        .game-btn { background: #6c5ce7; color: white; border: none; padding: 12px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3); }

        .tabs { display: flex; background: var(--card); border-radius: 20px; margin: 20px 0; width: 92%; max-width: 380px; padding: 5px; }
        .tab { flex: 1; padding: 12px; border: none; background: none; font-weight: 700; color: #6c5ce7; cursor: pointer; border-radius: 15px; }
        .tab.active { background: #6c5ce7; color: white; }

        .pol { background: white; padding: 8px 8px 25px 8px; width: 105px; box-shadow: 3px 8px 20px rgba(0,0,0,0.15); position: relative; margin: 8px; transform: rotate(-3deg); display: inline-block; transition: 0.3s; }
        .pol img { width: 100%; height: 100px; object-fit: cover; }
        .not-item { background: white; margin: 10px; padding: 15px; border-radius: 15px; width: 85%; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: left; border-left: 5px solid #ff758c; }
        .del-btn { position: absolute; top: -8px; right: -8px; background: var(--red); color: white; border-radius: 50%; width: 24px; height: 24px; border: 2px solid white; font-weight: bold; cursor: pointer; font-size: 14px; }

        .not-input-container { width: 92%; max-width: 380px; margin-bottom: 15px; }
        .not-input { width: 100%; padding: 15px; border-radius: 20px; border: 2px solid #6c5ce7; box-sizing: border-box; resize: none; font-family: 'Poppins'; background: rgba(255,255,255,0.9); }
        
        .floating-ctrl { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .circle-btn { width: 60px; height: 60px; border-radius: 50%; border: 3px solid white; background: var(--red); color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; box-shadow: 0 5px 20px rgba(214, 48, 49, 0.4); }

        #loading { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); color:white; z-index:9999; align-items:center; justify-content:center; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div id="loading">✨ Anılar Yükleniyor... ❤️</div>

    <h1 style="font-family:'Pacifico'; color:white; text-shadow: 2px 2px 10px rgba(0,0,0,0.2); margin: 20px 0;">Muly & Olcay</h1>

    <div class="card">
        <div id="gun">...</div>
        <div id="saat">00 : 00 : 00</div>
        <div class="quote">Sonsuza dek sürecek bir aşk hikayesi...</div>
    </div>

    <div class="kalpler">
        <div style="text-align: center;"><button onclick="at('M')" class="k-btn">💖</button><div class="k-label">Muly</div></div>
        <div style="text-align: center;"><button onclick="at('O')" class="k-btn">💝</button><div class="k-label">Olcay</div></div>
    </div>

    <div class="game-box">
        <div id="task-display">Bir görev çekmeye ne dersin? ✨</div>
        <div id="task-timer">Kalan Süre: 03:00:00</div>
        <button id="taskBtn" class="game-btn" onclick="getTask()">Görevi Çek</button>
    </div>

    <div class="tabs">
        <button id="t1" class="tab active" onclick="tab('g')">🖼️ Galeri</button>
        <button id="t2" class="tab" onclick="tab('a')">✍️ Anılar</button>
    </div>

    <div id="not-input-area" class="not-input-container" style="display:none;">
        <textarea id="notTxt" class="not-input" placeholder="Buraya bir şeyler karala... ❤️"></textarea>
        <button class="game-btn" style="margin-top:5px;" onclick="saveNote()">Anıyı Kaydet</button>
    </div>

    <div id="gs" style="display: flex; flex-wrap: wrap; justify-content: center; width: 100%;"></div>
    <div id="as" style="display:none; width:100%; flex-direction:column; align-items:center;"></div>

    <div class="floating-ctrl">
        <input type="file" id="fotoInput" style="display:none;" accept="image/*" onchange="uploadPhoto(this)">
        <div class="circle-btn" onclick="document.getElementById('fotoInput').click()">📸</div>
    </div>

    <script>
        const T = '8679884252:AAExbOnyIg_MNFv00NRnW79-vtlH5KB6j0w';
        const M_CHAT = '8697863466'; // Muly'e gidecek
        const O_CHAT = '6555602691'; // Olcay'a gidecek
        const S = '1JgcElY-IQEvViAZjivDtZPhzDJqE6kwetokPrnR-Kjk';
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbwi-0o6xAFHr8DlkR6BWPYiA9bDK2ecghWt_uUdvBsazcdVzU9BoNtLafblCXK27ZjTKA/exec';
        const start = new Date(2026, 2, 14, 0, 8, 0);

        const tasks = [
            "Birbirimize en sevdiğimiz fotoğrafı anılara ekle.",
            "Şu an ne yapıyorsan onun fotoğrafını çekip at.",
            "Bana 1 dakikalık sesli mesaj gönder.",
            "Yarına beraber yapacağımız bir aktivite planla."
        ];

        let timerInterval;

        function at(k) {
            let msg = "";
            let target = "";
            if(k === 'M') {
                msg = "Muly seni çok özledi Olcay";
                target = O_CHAT;
            } else {
                msg = "Olcayın yine aklındasın. Pardon ne zaman çıktın ki?";
                target = M_CHAT;
            }
            fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${target}&text=${encodeURIComponent(msg)}`);
        }

        function getTask() {
            const btn = document.getElementById('taskBtn');
            const display = document.getElementById('task-display');
            const timerDisplay = document.getElementById('task-timer');
            const randomTask = tasks[Math.floor(Math.random() * tasks.length)];
            
            display.innerText = randomTask;
            btn.disabled = true;
            btn.style.opacity = "0.5";
            timerDisplay.style.display = "block";

            fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${O_CHAT}&text=${encodeURIComponent("⚠️ Görev Başladı: " + randomTask)}`);
            fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${M_CHAT}&text=${encodeURIComponent("⚠️ Görev Başladı: " + randomTask)}`);

            let timeLeft = 3 * 60 * 60;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let h = Math.floor(timeLeft / 3600);
                let m = Math.floor((timeLeft % 3600) / 60);
                let s = timeLeft % 60;
                timerDisplay.innerText = `Kalan Süre: ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.innerText = "Süre Doldu!";
                    btn.disabled = false; btn.style.opacity = "1";
                }
                timeLeft--;
            }, 1000);
        }

        async function saveNote() {
            const val = document.getElementById('notTxt').value;
            if(!val) return;
            document.getElementById('loading').style.display = 'flex';
            await fetch(`${scriptUrl}?ani=${encodeURIComponent(val)}&foto=`, {mode:'no-cors'});
            document.getElementById('notTxt').value = "";
            load();
            document.getElementById('loading').style.display = 'none';
        }

        async function uploadPhoto(input) {
            if(!input.files[0]) return;
            document.getElementById('loading').style.display = 'flex';
            const fd = new FormData(); fd.append('image', input.files[0]);
            const res = await fetch('https://api.imgbb.com/1/upload?key=81c9056d649d8ec38029019623e1373a', {method:'POST', body:fd});
            const d = await res.json();
            if(d.success) {
                await fetch(`${scriptUrl}?ani=&foto=${encodeURIComponent(d.data.url)}`, {mode:'no-cors'});
                load();
            }
            document.getElementById('loading').style.display = 'none';
        }

        async function load() {
            const r = await fetch(`https://docs.google.com/spreadsheets/d/${S}/gviz/tq?tqx=out:csv&v=${Math.random()}`);
            const data = await r.text();
            const lines = data.split('\n').slice(1);
            const g = document.getElementById('gs'), a = document.getElementById('as');
            g.innerHTML = ""; a.innerHTML = "";
            lines.forEach((l, i) => {
                const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                let txt = c[0]?.replace(/"/g,''), img = c[1]?.replace(/"/g,'');
                if(img && img.includes('http')) {
                    g.insertAdjacentHTML('afterbegin', `<div class="pol"><button class="del-btn" onclick="del(${i+2})">×</button><img src="${img}"></div>`);
                } else if(txt && txt.trim() !== "") {
                    a.insertAdjacentHTML('afterbegin', `<div class="not-item"><button class="del-btn" onclick="del(${i+2})">×</button>${txt}</div>`);
                }
            });
        }

        async function del(id) {
            if(!confirm("Bu anıyı siliyorum, emin misin?")) return;
            document.getElementById('loading').style.display = 'flex';
            await fetch(`${scriptUrl}?del=${id}`, {mode:'no-cors'});
            load();
            document.getElementById('loading').style.display = 'none';
        }

        function tab(x) {
            document.getElementById('gs').style.display = x==='g'?'block':'none';
            document.getElementById('as').style.display = x==='a'?'flex':'none';
            document.getElementById('not-input-area').style.display = x==='a'?'block':'none';
            document.getElementById('t1').classList.toggle('active', x==='g');
            document.getElementById('t2').classList.toggle('active', x==='a');
        }

        function count() {
            const f = new Date() - start;
            const d = Math.floor(f/86400000), h = Math.floor((f%86400000)/3600000), m = Math.floor((f%3600000)/60000), s = Math.floor((f%60000)/1000);
            document.getElementById('gun').innerText = d + " GÜN";
            document.getElementById('saat').innerText = `${String(h).padStart(2,'0')} : ${String(m).padStart(2,'0')} : ${String(s).padStart(2,'0')}`;
        }

        window.onload = () => { load(); setInterval(count, 1000); };
    </script>
</body>
</html>
