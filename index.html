<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muly ❤️ Olcay</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Muly & Olcay">
    <meta name="theme-color" content="#ff4d6d">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Pacifico&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ana-renk: #002d72; --vurgu: #fec10d; --kalp: #ff4d6d; 
            --bg: #fff0f3; --romantik: #7209b7;
        }

        /* GECE MODU RENKLERİ */
        body.gece-modu {
            --bg: #0b0d17; --ana-renk: #a29bfe; 
            --romantik: #e0aaff; --kalp: #ff758c;
            background: linear-gradient(135deg, #0b0d17 0%, #1c1e33 100%);
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; transition: 1s ease; }
        
        .card { background: white; padding: 30px 20px; border-radius: 30px; text-align: center; border: 2px solid rgba(255, 77, 109, 0.2); width: 90%; max-width: 380px; margin-top: 10px; box-shadow: 0 15px 35px rgba(255, 77, 109, 0.15); position: relative; transition: 0.5s; color: #333; }
        body.gece-modu .card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border-color: var(--romantik); color: white; }

        .sayac-baslik { font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: var(--romantik); margin-bottom: 10px; }
        #gun-sayi { font-size: 3.5rem; font-weight: 800; color: var(--kalp); display: block; line-height: 1; }
        #saat-alani { font-size: 1.4rem; font-weight: 600; color: var(--ana-renk); display: block; margin-top: 12px; letter-spacing: 2px; }
        
        #yildizlar { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; display: none; }
        body.gece-modu #yildizlar { display: block; }

        .tab-container { display: flex; gap: 10px; margin: 25px 0; width: 100%; max-width: 350px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 20px; background: white; color: var(--ana-renk); font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 0.85rem; }
        .tab-btn.active { background: var(--kalp); color: white; box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3); }

        /* Fotoğraf ve Anı Stilleri */
        .album { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; width: 100%; }
        .polaroid { background: white; padding: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 145px; border-radius: 5px; transform: rotate(-1.5deg); text-align: center; border: 1px solid #ffe5ec; color: #333; }
        .polaroid img { width: 100%; height: 135px; object-fit: cover; border-radius: 3px; }
        
        .ani-kutusu { background: white; margin: 12px 0; padding: 18px; border-radius: 20px; border-right: 4px solid var(--vurgu); border-left: 4px solid var(--kalp); width: 90%; max-width: 360px; text-align: left; color: #333; }
        body.gece-modu .ani-kutusu { background: rgba(255,255,255,0.9); }

        .kalp-bolumu { display: flex; gap: 40px; align-items: center; justify-content: center; margin: 25px 0; }
        .btn-kalp-suslu { font-size: 3.8rem; background: none; border: none; cursor: pointer; transition: 0.5s; filter: drop-shadow(0 8px 15px rgba(255, 77, 109, 0.3)); }
        .btn-kalp-suslu:hover { transform: scale(1.3) rotate(8deg); }

        #bilgi { color: var(--kalp); font-weight: 600; margin-top: 10px; text-align: center; min-height: 25px; }
        
        .btn-ekle { position: fixed; bottom: 25px; right: 25px; background: var(--kalp); color: white; width: 65px; height: 65px; border-radius: 50%; border: 4px solid white; font-size: 35px; cursor: pointer; z-index: 100; box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4); }
    </style>
</head>
<body>

    <div id="yildizlar"></div>
    <h1 id="ana-baslik" style="font-family: 'Pacifico'; color: var(--kalp); margin-top: 10px; font-weight: normal;">İyi ki Varsın...</h1>

    <div class="card">
        <div class="sayac-baslik">Aşkımız Başlayalı;</div>
        <span id="gun-sayi">Yükleniyor...</span>
        <span id="saat-alani">00 : 00 : 00</span>
    </div>

    <div class="tab-container">
        <button id="btn-galeri" class="tab-btn active" onclick="tabDegistir('galeri')">🖼️ Fotoğraflar</button>
        <button id="btn-anilar" class="tab-btn" onclick="tabDegistir('anilar')">✍️ Anılar</button>
    </div>

    <div id="galeri-section" class="album">
        <div id="album-container" class="album"></div>
    </div>

    <div id="anilar-section" style="display: none; width: 100%; flex-direction: column; align-items: center;">
        <div id="etablo-anilar" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    </div>

    <div class="kalp-bolumu">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <span style="font-family: 'Pacifico'; font-size: 0.8rem;">Muly'nin Kalbi</span>
            <button onclick="kalpAt('Muly')" class="btn-kalp-suslu">💖</button>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center;">
            <span style="font-family: 'Pacifico'; font-size: 0.8rem;">Olcay'ın Kalbi</span>
            <button onclick="kalpAt('Olcay')" class="btn-kalp-suslu">💝</button>
        </div>
    </div>

    <div id="bilgi"></div>

    <button class="btn-ekle" onclick="document.getElementById('resimSecici').click()">+</button>
    <input type="file" id="resimSecici" style="display: none;" accept="image/*" onchange="yukle(event)">

    <script>
        const BOT_TOKEN = '8679884252:AAExbOnyIg_MNFv00NRnW79-vtlH5KB6j0w';
        const MY_ID = '6555602691'; 
        const ONUN_ID = '8697863466'; 
        const API_KEY = '5767fb3279ed0b1f20bf5beab37300d4';
        const SHEET_ID = '1JgcElY-IQEvViAZjivDtZPhzDJqE6kwetokPrnR-Kjk';
        const baslangic = new Date(2026, 2, 14, 0, 8, 0);

        function modKontrol() {
            const saat = new Date().getHours();
            const baslik = document.getElementById('ana-baslik');
            // Saat 20:00 olduktan sonra veya sabah 06:00'dan önce
            if (saat >= 20 || saat < 6) {
                document.body.classList.add('gece-modu');
                baslik.innerText = "Gökyüzündeki En Parlak Yıldızım Muly...";
                yildizOlustur();
            } else {
                document.body.classList.remove('gece-modu');
                baslik.innerText = "İyi ki Varsın...";
            }
        }

        function yildizOlustur() {
            const yildizKonteynir = document.getElementById('yildizlar');
            yildizKonteynir.innerHTML = "";
            for (let i = 0; i < 50; i++) {
                const yildiz = document.createElement('div');
                yildiz.style.position = 'absolute';
                yildiz.style.width = '2px'; yildiz.style.height = '2px';
                yildiz.style.backgroundColor = 'white';
                yildiz.style.top = Math.random() * 100 + '%';
                yildiz.style.left = Math.random() * 100 + '%';
                yildiz.style.borderRadius = '50%';
                yildiz.style.opacity = Math.random();
                yildiz.style.animation = `nefes ${Math.random() * 3 + 2}s infinite`;
                yildizKonteynir.appendChild(yildiz);
            }
        }

        async function verileriGetir() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&cb=${Math.random()}`;
                const yanit = await fetch(url);
                const csv = await yanit.text();
                const satirlar = csv.split('\n').slice(1);
                const albumDiv = document.getElementById('album-container');
                const listeDiv = document.getElementById('etablo-anilar');
                albumDiv.innerHTML = ""; listeDiv.innerHTML = "";
                
                satirlar.forEach(satir => {
                    const hucreler = satir.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    let ani = hucreler[0]?.replace(/"/g,'').trim();
                    let foto = hucreler[1]?.replace(/"/g,'').trim();
                    let tarih = hucreler[2]?.replace(/"/g,'').trim() || "";
                    
                    if(foto && foto.includes('http')) { 
                        albumDiv.insertAdjacentHTML('afterbegin', `<div class="polaroid"><img src="${foto}" onclick="window.open('${foto}')"></div>`);
                    } 
                    if(ani && !ani.includes('http')) {
                        listeDiv.insertAdjacentHTML('afterbegin', `<div class="ani-kutusu"><div><small style="color:var(--kalp)">✨ ${tarih}</small></div><div>${ani}</div></div>`);
                    }
                });
            } catch(e) { console.log("Veri çekme hatası"); }
        }

        async function yukle(e) {
            const cevap = prompt("Şifre: Olcay mı yoksa sen mi daha çok seviyorsun?");
            if (cevap?.toLowerCase().trim() !== "olcay") return;
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById('bilgi').innerText = "Yükleniyor... ❤️";
            const fd = new FormData(); fd.append('image', file);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {method:'POST', body:fd});
            const data = await res.json();
            if(data.success) {
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${MY_ID}&text=${encodeURIComponent('📸 Yeni Foto: ' + data.data.url)}`);
                document.getElementById('bilgi').innerText = "Anı gönderildi! ❤️";
                setTimeout(() => location.reload(), 2000);
            }
        }

        function kalpAt(kim) {
            let hedefID = (kim === 'Muly') ? MY_ID : ONUN_ID;
            let mesaj = (kim === 'Muly') ? "Olcay, Muly seni çok özledi! ❤️" : "Muly, Olcay'ın yine aklındasın 💝 Pardon, ne zaman çıktın ki?";
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${hedefID}&text=${encodeURIComponent(mesaj)}`);
            document.getElementById('bilgi').innerText = "Sevgini gönderdin! ❤️";
            setTimeout(() => document.getElementById('bilgi').innerText = "", 2500);
        }

        function tabDegistir(tab) {
            document.getElementById('galeri-section').style.display = (tab === 'galeri') ? 'flex' : 'none';
            document.getElementById('anilar-section').style.display = (tab === 'anilar') ? 'flex' : 'none';
            document.getElementById('btn-galeri').classList.toggle('active', tab === 'galeri');
            document.getElementById('btn-anilar').classList.toggle('active', tab === 'anilar');
        }

        function sayac() {
            const fark = new Date() - baslangic;
            const d = Math.floor(fark / 86400000);
            const h = Math.floor((fark % 86400000) / 3600000);
            const m = Math.floor((fark % 3600000) / 60000);
            const s = Math.floor((fark % 60000) / 1000);
            document.getElementById('gun-sayi').innerText = d + " GÜN";
            document.getElementById('saat-alani').innerText = `${String(h).padStart(2,'0')} : ${String(m).padStart(2,'0')} : ${String(s).padStart(2,'0')}`;
        }

        setInterval(sayac, 1000);
        setInterval(modKontrol, 30000); 
        window.onload = () => { verileriGetir(); modKontrol(); sayac(); };
    </script>
</body>
</html>
