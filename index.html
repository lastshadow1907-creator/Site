<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muly ❤️ Olcay</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Pacifico&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --ana: #ff758c; 
            --bg: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); 
            --card: rgba(255, 255, 255, 0.9); 
            --text: #4a4a4a; 
            --neon: #ff4757;
            --shadow: rgba(0,0,0,0.1);
        }

        body.night {
            --bg: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            --card: rgba(30, 30, 30, 0.85);
            --text: #f1f2f6;
            --ana: #ff758c;
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            background-attachment: fixed;
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            color: var(--text); 
            transition: 1.5s; 
            overflow-x: hidden; 
            padding-bottom: 120px;
        }

        /* Uçuşan Kalpler Efekti */
        .heart-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
        }
        .floating-heart {
            position: absolute; color: rgba(255, 255, 255, 0.4);
            animation: float 10s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .card { 
            background: var(--card); 
            width: 92%; max-width: 380px; 
            border-radius: 35px; padding: 25px 15px; 
            text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            backdrop-filter: blur(10px); margin-top: 10px;
        }

        #gun { font-size: 3.5rem; font-weight: 800; color: #ff4757; line-height: 1; }
        #saat { font-size: 1.8rem; font-weight: 600; color: var(--ana); }

        /* Müzik Plak */
        .music-player { position: fixed; bottom: 30px; left: 20px; z-index: 1000; }
        .music-btn { 
            background: white; border: 3px solid #ff758c; 
            width: 60px; height: 60px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 28px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
            animation: rotate 4s linear infinite; animation-play-state: paused;
        }
        .music-btn.playing { animation-play-state: running; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Kalpler ve İsimler */
        .kalpler { display: flex; gap: 50px; margin: 20px 0; }
        .k-btn { background: none; border: none; cursor: pointer; font-size: 4rem; transition: 0.3s; }
        .k-label { font-size: 1.2rem; font-weight: bold; color: white; font-family: 'Dancing Script'; text-shadow: 1px 1px 5px rgba(0,0,0,0.3); }

        /* Galeri */
        .pol { 
            background: white; padding: 10px 10px 30px 10px; 
            width: 120px; box-shadow: 5px 10px 20px rgba(0,0,0,0.2); 
            margin: 10px; transform: rotate(-3deg); position: relative;
        }
        .pol img { width: 100%; height: 110px; object-fit: cover; }
        .del-btn { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; border: none; width: 25px; height: 25px; cursor: pointer; }

        .tabs { display: flex; width: 92%; max-width: 380px; margin: 20px 0; background: rgba(255,255,255,0.2); border-radius: 50px; padding: 5px; }
        .tab { flex: 1; padding: 12px; border: none; background: none; color: white; font-weight: bold; cursor: pointer; border-radius: 50px; }
        .tab.active { background: white; color: #ff758c; }

        .add-btn { position: fixed; bottom: 30px; right: 20px; background: #ff4757; color: white; width: 65px; height: 65px; border-radius: 50%; border: 3px solid white; font-size: 30px; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        
        #loading-overlay { display:none; position:fixed; inset:0; background:rgba(255,117,140,0.9); color:white; z-index:9999; align-items:center; justify-content:center; font-weight:bold; }
        .popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:5000; align-items:center; justify-content:center; padding:20px; }
        .popup-box { background: white; padding: 20px; border-radius: 30px; text-align: center; width: 100%; max-width: 300px; }
    </style>
</head>
<body id="mainBody">

    <div class="heart-bg" id="heart-container"></div>
    <div id="loading-overlay">Sonsuz Aşk Yükleniyor... ❤️</div>

    <h1 style="font-family:'Pacifico'; color:white; text-shadow: 2px 2px 10px rgba(0,0,0,0.2); margin: 20px 0;">Muly & Olcay</h1>

    <div class="card">
        <span style="font-size: 3rem;">♾️</span>
        <div id="gun">...</div>
        <div id="saat">00:00:00</div>
        <div style="margin-top:10px; font-weight:bold; color:var(--ana);">Aşkla Geçen Her Saniye...</div>
    </div>

    <div class="kalpler">
        <div style="text-align: center;">
            <button onclick="at('M')" class="k-btn">💖</button>
            <div class="k-label">Muly</div>
        </div>
        <div style="text-align: center;">
            <button onclick="at('O')" class="k-btn">💝</button>
            <div class="k-label">Olcay</div>
        </div>
    </div>

    <div class="tabs">
        <button id="t1" class="tab active" onclick="tab('g')">Anılarımız</button>
        <button id="t2" class="tab" onclick="tab('a')">Notlar</button>
    </div>

    <div id="gs" style="display: flex; flex-wrap: wrap; justify-content: center; width: 100%;"></div>
    <div id="as" style="display:none; width: 100%; flex-direction: column; align-items: center;"></div>

    <div class="music-player">
        <audio id="ourSong" src="https://files.catbox.moe/bkrabb.mp3" loop></audio>
        <div id="musicBtn" class="music-btn" onclick="toggleMusic()">🎵</div>
    </div>

    <input type="file" id="fotoInput" style="display:none;" accept="image/*" onchange="handleFile(this)">
    <button class="add-btn" onclick="document.getElementById('fotoInput').click()">📸</button>

    <div id="previewPopup" class="popup">
        <div class="popup-box">
            <h3 style="color:#ff758c">Çok Güzel Çıktınız! 😍</h3>
            <img id="imgPreview" style="width:100%; border-radius:15px; margin:15px 0;">
            <button onclick="uploadConfirmedFile()" style="background:#ff758c; color:white; border:none; padding:15px; border-radius:50px; width:100%; font-weight:bold;">Anılara Ekle ✨</button>
            <button onclick="document.getElementById('previewPopup').style.display='none'" style="background:none; border:none; margin-top:10px; color:#666;">Vazgeç</button>
        </div>
    </div>

    <script>
        const T = '8679884252:AAExbOnyIg_MNFv00NRnW79-vtlH5KB6j0w';
        const M = '8697863466'; 
        const O = '6555602691'; 
        const S = '1JgcElY-IQEvViAZjivDtZPhzDJqE6kwetokPrnR-Kjk';
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbwi-0o6xAFHr8DlkR6BWPYiA9bDK2ecghWt_uUdvBsazcdVzU9BoNtLafblCXK27ZjTKA/exec';
        const start = new Date(2026, 2, 14, 0, 8, 0);

        let selectedFile = null;

        function toggleMusic() {
            const music = document.getElementById('ourSong');
            const btn = document.getElementById('musicBtn');
            if (music.paused) { music.play(); btn.classList.add('playing'); } 
            else { music.pause(); btn.classList.remove('playing'); }
        }

        function createFloatingHearts() {
            const container = document.getElementById('heart-container');
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.duration = (Math.random() * 5 + 5) + 's';
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 8000);
            }, 1000);
        }

        function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('imgPreview').src = e.target.result;
                document.getElementById('previewPopup').style.display = 'flex';
            }
            reader.readAsDataURL(file);
        }

        async function uploadConfirmedFile() {
            document.getElementById('previewPopup').style.display = 'none';
            const loader = document.getElementById('loading-overlay');
            loader.style.display = 'flex';
            const formData = new FormData();
            formData.append('image', selectedFile);
            
            try {
                const res = await fetch('https://api.imgbb.com/1/upload?key=81c9056d649d8ec38029019623e1373a', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    await fetch(`${scriptUrl}?ani=&foto=${encodeURIComponent(data.data.url)}`, { mode: 'no-cors' });
                    fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${O}&text=${encodeURIComponent("📸 Muly yeni bir fotoğraf yükledi!")}`);
                    setTimeout(() => { load(); loader.style.display = 'none'; }, 2000);
                }
            } catch (e) { loader.style.display = 'none'; alert("Yükleme başarısız oldu."); }
        }

        async function load() {
            try {
                const r = await fetch(`https://docs.google.com/spreadsheets/d/${S}/gviz/tq?tqx=out:csv&v=${Math.random()}`);
                const csv = await r.text();
                const lines = csv.split('\n').slice(1);
                const g = document.getElementById('gs'), a = document.getElementById('as');
                g.innerHTML = ""; a.innerHTML = "";
                lines.forEach((l, index) => {
                    const lineId = index + 2; 
                    const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    let txt = c[0]?.replace(/"/g,''), img = c[1]?.replace(/"/g,'');
                    if(img?.includes('http')) {
                        g.insertAdjacentHTML('afterbegin', `<div class="pol"><button class="del-btn" onclick="delAni(${lineId})">×</button><img src="${img}"></div>`);
                    } else if(txt && !txt.includes("TASK_SYNC")) {
                        a.insertAdjacentHTML('afterbegin', `<div style="background:white; margin:10px; padding:15px; border-radius:15px; width:80%; color:#333;">${txt}</div>`);
                    }
                });
            } catch (e) {}
        }

        async function delAni(id) {
            if(!confirm("Bu anıyı silmek istiyor musun?")) return;
            document.getElementById('loading-overlay').style.display = 'flex';
            await fetch(`${scriptUrl}?del=${id}`, { mode: 'no-cors' });
            setTimeout(() => { load(); document.getElementById('loading-overlay').style.display = 'none'; }, 1500);
        }

        function at(k) {
            const msg = k === 'M' ? "Muly seni çok özledi! ❤️" : "Olcay seni düşünüyor! 💝";
            const target = k === 'M' ? O : M;
            fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${target}&text=${encodeURIComponent(msg)}`);
            alert("Sevgi iletildi! ✨");
        }

        function count() {
            const now = new Date();
            const f = now - start;
            const d = Math.floor(f/86400000);
            const h = Math.floor((f%86400000)/3600000), m = Math.floor((f%3600000)/60000), s = Math.floor((f%60000)/1000);
            document.getElementById('gun').innerText = d + " GÜN";
            document.getElementById('saat').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function tab(x) {
            document.getElementById('gs').style.display = x==='g'?'flex':'none';
            document.getElementById('as').style.display = x==='a'?'flex':'none';
            document.getElementById('t1').classList.toggle('active', x==='g');
            document.getElementById('t2').classList.toggle('active', x==='a');
        }

        window.onload = () => { 
            load(); 
            count(); 
            setInterval(count, 1000); 
            createFloatingHearts();
            if(new Date().getHours() >= 20 || new Date().getHours() < 7) document.body.classList.add('night');
        };
    </script>
</body>
</html>
