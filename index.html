<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muly ❤️ Olcay</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Pacifico&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ana: #5d7fb9; --bg: #e9f1fa; --card: rgba(255, 255, 255, 0.9); --text: #333; --neon: #ff4757; --shadow: rgba(0,0,0,0.1); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--text); overflow-x: hidden; padding-bottom: 120px; }

        .card { background: var(--card); width: 92%; max-width: 380px; border-radius: 35px; padding: 25px 15px; text-align: center; box-shadow: 0 12px 30px var(--shadow); margin-top: 10px; }
        #gun { font-size: 3.2rem; font-weight: 800; color: #b02a3a; line-height: 1; }
        #saat { font-size: 1.8rem; font-weight: 600; color: var(--ana); letter-spacing: 1px; }

        /* Kalpler ve Yazılar */
        .kalpler { display: flex; gap: 60px; margin: 25px 0; align-items: center; justify-content: center; }
        .k-btn { background: none; border: none; cursor: pointer; font-size: 3.5rem; transition: 0.3s; padding: 0; }
        .k-label { font-size: 1.1rem; font-weight: 800; color: #b02a3a; margin-top: 5px; font-family: 'Dancing Script', cursive; }

        /* Görev Kutusu */
        .game-box { background: var(--card); width: 92%; max-width: 380px; border-radius: 25px; padding: 20px; text-align: center; margin-top: 20px; border: 2px dashed var(--ana); box-sizing: border-box; }
        .game-btn { background: var(--ana); color: white; border: none; padding: 12px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }

        /* Galeri & Tablar */
        .tabs { display: flex; background: var(--card); border-radius: 20px; margin: 20px 0; width: 92%; max-width: 380px; overflow: hidden; padding: 5px; }
        .tab { flex: 1; padding: 12px; border: none; background: none; font-weight: 700; color: var(--ana); cursor: pointer; border-radius: 15px; }
        .tab.active { background: var(--ana); color: white; }

        .pol { background: white; padding: 8px 8px 25px 8px; border-radius: 2px; width: 105px; box-shadow: 3px 5px 15px rgba(0,0,0,0.15); position: relative; margin-bottom: 15px; transform: rotate(-3deg); }
        .pol img { width: 100%; height: 100px; object-fit: cover; }
        .del-btn { position: absolute; top: -8px; right: -8px; background: #ff4757; color: white; border-radius: 50%; width: 24px; height: 24px; border: 2px solid white; font-weight: bold; cursor: pointer; }

        /* Müzik Plak */
        .music-player { position: fixed; bottom: 110px; left: 25px; z-index: 1000; }
        .music-btn { background: white; border: 3px solid var(--ana); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; animation: rotate 4s linear infinite; animation-play-state: paused; }
        .music-btn.playing { animation-play-state: running; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #loading { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); color:white; z-index:9999; align-items:center; justify-content:center; }
        .ani-panel { position: fixed; bottom: 110px; right: 25px; z-index: 1000; }
        .ani-btn { background: #b02a3a; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body onclick="tryPlay()">

    <div id="loading">Büyü Hazırlanıyor... ❤️</div>

    <h1 style="font-family:'Pacifico'; color:#b02a3a;">İyi ki Varsın...</h1>

    <div class="card">
        <div id="gun">...</div>
        <div id="saat">00 : 00 : 00</div>
    </div>

    <div class="kalpler">
        <div style="text-align: center;">
            <button onclick="at('M')" class="k-btn">💖</button>
            <div class="k-label">Muly</div>
        </div>
        <div style="text-align: center;">
            <button onclick="at('O')" class="k-btn">💝</button>
            <div class="k-label">Olcay</div>
        </div>
    </div>

    <div class="game-box">
        <div id="task-display" style="font-family: 'Dancing Script'; font-size: 1.5rem; color: #b02a3a;">Hediyeni Çek 🎁</div>
        <button class="game-btn" onclick="getTask()">Görevi Çek</button>
    </div>

    <div class="tabs">
        <button id="t1" class="tab active" onclick="tab('g')">🖼️ Galeri</button>
        <button id="t2" class="tab" onclick="tab('a')">✍️ Anılar</button>
    </div>

    <div id="gs" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 100%;"></div>
    <div id="as" style="display:none; width:100%; flex-direction:column; align-items:center;"></div>

    <div class="music-player">
        <audio id="ourSong" src="https://files.catbox.moe/bkrabb.mp3" loop></audio>
        <div id="musicBtn" class="music-btn" onclick="toggleMusic()">🎵</div>
    </div>

    <input type="file" id="fotoInput" style="display:none;" accept="image/*" onchange="uploadPhoto(this)">
    <div class="ani-panel">
        <div class="ani-btn" onclick="document.getElementById('fotoInput').click()">📸</div>
    </div>

    <script>
        const T = '8679884252:AAExbOnyIg_MNFv00NRnW79-vtlH5KB6j0w';
        const M = '8697863466'; const O = '6555602691';
        const S = '1JgcElY-IQEvViAZjivDtZPhzDJqE6kwetokPrnR-Kjk';
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbwi-0o6xAFHr8DlkR6BWPYiA9bDK2ecghWt_uUdvBsazcdVzU9BoNtLafblCXK27ZjTKA/exec';
        const start = new Date(2026, 2, 14, 0, 8, 0);

        const tasks = ["Birbirimize en sevdiğimiz şarkıyı armağan edelim.", "Bugün birbirimize 5 tane 'neden seni seviyorum' cümlesi kuralım.", "En sevdiğimiz ortak anıyı sesli anlatalım.", "Görüntülü konuşup beraber bir kahve içelim."];

        function tryPlay() { document.getElementById('ourSong').play().catch(()=>{}); }

        function toggleMusic() {
            const m = document.getElementById('ourSong');
            const b = document.getElementById('musicBtn');
            if(m.paused){ m.play(); b.classList.add('playing'); }
            else { m.pause(); b.classList.remove('playing'); }
        }

        function getTask() {
            const t = tasks[Math.floor(Math.random() * tasks.length)];
            document.getElementById('task-display').innerText = t;
        }

        async function uploadPhoto(input) {
            if(!input.files[0]) return;
            document.getElementById('loading').style.display = 'flex';
            const formData = new FormData();
            formData.append('image', input.files[0]);
            try {
                const res = await fetch('https://api.imgbb.com/1/upload?key=81c9056d649d8ec38029019623e1373a', {method:'POST', body:formData});
                const data = await res.json();
                if(data.success) {
                    await fetch(`${scriptUrl}?ani=&foto=${encodeURIComponent(data.data.url)}`, {mode:'no-cors'});
                    alert("Fotoğraf eklendi! ✨");
                    load();
                }
            } catch(e){ alert("Hata oluştu."); }
            document.getElementById('loading').style.display = 'none';
        }

        async function load() {
            try {
                const r = await fetch(`https://docs.google.com/spreadsheets/d/${S}/gviz/tq?tqx=out:csv&v=${Math.random()}`);
                const data = await r.text();
                const lines = data.split('\n').slice(1);
                const g = document.getElementById('gs'), a = document.getElementById('as');
                g.innerHTML = ""; a.innerHTML = "";
                lines.forEach((l, index) => {
                    const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    let txt = c[0]?.replace(/"/g,''), img = c[1]?.replace(/"/g,'');
                    if(img && img.includes('http')) {
                        g.insertAdjacentHTML('afterbegin', `<div class="pol"><button class="del-btn" onclick="del(${index+2})">×</button><img src="${img}"></div>`);
                    } else if(txt && !txt.includes("TASK")) {
                        a.insertAdjacentHTML('afterbegin', `<div style="background:white; margin:10px; padding:15px; border-radius:15px; width:85%;">${txt}</div>`);
                    }
                });
            } catch(e){}
        }

        async function del(id) {
            if(!confirm("Silinsin mi?")) return;
            document.getElementById('loading').style.display = 'flex';
            await fetch(`${scriptUrl}?del=${id}`, {mode:'no-cors'});
            load();
            document.getElementById('loading').style.display = 'none';
        }

        function at(k) {
            const target = k==='M'?O:M;
            fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${target}&text=${encodeURIComponent("Seni çok seviyorum! ❤️")}`);
            alert("Kalp İletildi! ✨");
        }

        function count() {
            const now = new Date();
            const f = now - start;
            const d = Math.floor(f/86400000), h = Math.floor((f%86400000)/3600000), m = Math.floor((f%3600000)/60000), s = Math.floor((f%60000)/1000);
            document.getElementById('gun').innerText = d + " GÜN";
            document.getElementById('saat').innerText = `${String(h).padStart(2,'0')} : ${String(m).padStart(2,'0')} : ${String(s).padStart(2,'0')}`;
        }

        function tab(x) {
            document.getElementById('gs').style.display = x==='g'?'flex':'none';
            document.getElementById('as').style.display = x==='a'?'flex':'none';
            document.getElementById('t1').classList.toggle('active', x==='g');
            document.getElementById('t2').classList.toggle('active', x==='a');
        }

        window.onload = () => { load(); setInterval(count, 1000); };
    </script>
</body>
</html>
