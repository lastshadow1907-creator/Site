<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonsuza Dek Biz ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root { --ana-renk: #002d72; --vurgu-renk: #fec10d; --kalp-kirmizi: #ff4d6d; --cam-bg: rgba(255, 255, 255, 0.9); }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #fff0f3 0%, #ffccd5 50%, #ffb3c1 100%); background-attachment: fixed; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Kalpler */
        .bg-heart { position: fixed; color: var(--kalp-kirmizi); opacity: 0.2; pointer-events: none; z-index: 1; animation: floatUp 8s linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(110vh) scale(0.5); opacity: 0; } 100% { transform: translateY(-10vh) scale(1.2); opacity: 0; } }

        /* Sayaç */
        .counter-container { background: var(--cam-bg); backdrop-filter: blur(10px); width: 90%; max-width: 380px; padding: 30px 20px; border-radius: 30px; text-align: center; box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2); margin: 20px 0; border: 3px solid var(--vurgu-renk); z-index: 10; }
        .big-days { font-size: 3.5rem; color: var(--kalp-kirmizi); font-weight: 800; display: block; line-height: 1; }
        #saat-dakika-saniye { font-size: 1.4rem; font-weight: 600; letter-spacing: 2px; color: var(--ana-renk); }

        /* Albüm */
        .photo-album { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; width: 100%; max-width: 450px; margin: 20px 0; }
        .polaroid { background: white; padding: 10px 10px 25px 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-radius: 4px; width: 130px; transform: rotate(-3deg); animation: fadeIn 0.8s ease; }
        .polaroid img { width: 100%; height: 120px; object-fit: cover; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }

        /* Butonlar */
        .upload-wrapper { position: fixed; bottom: 25px; right: 25px; z-index: 1000; }
        .btn-upload { background: var(--kalp-kirmizi); color: white; width: 60px; height: 60px; border-radius: 50%; border: 4px solid white; font-size: 30px; cursor: pointer; box-shadow: 0 8px 15px rgba(255, 77, 109, 0.4); }
        .heart-btn { font-size: 5rem; background: none; border: none; cursor: pointer; transition: 0.3s; z-index: 10; }
        .memory-card { background: var(--cam-bg); margin-bottom: 15px; padding: 15px; border-radius: 15px; border-left: 5px solid var(--kalp-kirmizi); width: 90%; max-width: 380px; text-align: left; }
    </style>
</head>
<body>

    <h1 style="font-family: 'Pacifico'; color: var(--kalp-kirmizi); font-size: 2.2rem;">Bizim Hikayemiz</h1>

    <div class="counter-container">
        <span class="big-days" id="gun">... GÜN</span>
        <span id="saat-dakika-saniye">00 : 00 : 00</span>
    </div>

    <div id="photo-container" class="photo-album"></div>

    <button id="loveBtn" class="heart-btn">❤️</button>
    <div id="statusMsg" style="height: 20px; font-weight: 700; color: var(--kalp-kirmizi); margin-bottom: 10px;"></div>

    <div id="memory-container"></div>

    <div class="upload-wrapper">
        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">+</button>
        <input type="file" id="fileInput" style="display: none;" accept="image/*" onchange="handleFileUpload(event)">
        <div id="upload
