<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muly ❤️ Olcay</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Pacifico&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ana: #5d7fb9; --bg: #e9f1fa; --card: rgba(255, 255, 255, 0.95); --text: #333; --red: #b02a3a; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--text); padding-bottom: 250px; }

        .card { background: var(--card); width: 92%; max-width: 380px; border-radius: 35px; padding: 25px 15px; text-align: center; box-shadow: 0 12px 30px rgba(0,0,0,0.1); margin-top: 10px; }
        #gun { font-size: 3rem; font-weight: 800; color: var(--red); line-height: 1; }
        #saat { font-size: 1.6rem; font-weight: 600; color: var(--ana); letter-spacing: 1px; }

        .kalpler { display: flex; gap: 50px; margin: 20px 0; justify-content: center; }
        .k-btn { background: none; border: none; cursor: pointer; font-size: 3.5rem; transition: 0.3s; padding: 0; }
        .k-label { font-size: 1.1rem; font-weight: 800; color: var(--red); font-family: 'Dancing Script', cursive; }

        /* Tabs */
        .tabs { display: flex; background: var(--card); border-radius: 20px; margin: 20px 0; width: 92%; max-width: 380px; padding: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .tab { flex: 1; padding: 12px; border: none; background: none; font-weight: 700; color: var(--ana); cursor: pointer; border-radius: 15px; }
        .tab.active { background: var(--ana); color: white; }

        /* Not & Galeri */
        .pol { background: white; padding: 8px 8px 25px 8px; width: 105px; box-shadow: 3px 5px 15px rgba(0,0,0,0.15); position: relative; margin: 8px; transform: rotate(-3deg); display: inline-block; }
        .pol img { width: 100%; height: 100px; object-fit: cover; }
        .not-item { background: white; margin: 10px; padding: 15px; border-radius: 15px; width: 85%; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: left; }
        .del-btn { position: absolute; top: -8px; right: -8px; background: var(--red); color: white; border-radius: 50%; width: 24px; height: 24px; border: 2px solid white; font-weight: bold; cursor: pointer; font-size: 14px; }

        /* Not Ekleme Bölümü */
        .not-input-container { width: 92%; max-width: 380px; margin-bottom: 20px; }
        .not-input { width: 100%; padding: 15px; border-radius: 20px; border: 2px solid var(--ana); font-family: 'Poppins'; box-sizing: border-box; resize: none; }
        .add-btn { background: var(--ana); color: white; border: none; padding: 12px; border-radius: 50px; width: 100%; font-weight: bold; margin-top: 8px; cursor: pointer; }

        /* YouTube Music Sabit Panel */
        .yt-player { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; background: #000; z-index: 2000; border-top: 3px solid var(--ana); }
        .yt-frame { width: 100%; height: 100%; border: none; }

        /* Sabit Kontroller */
        .floating-ctrl { position: fixed; bottom: 95px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .circle-btn { width: 55px; height: 55px; border-radius: 50%; border: 3px solid white; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        #loading { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); color:white; z-index:9999; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div id="loading">Kalpler Hazırlanıyor... ❤️</div>

    <h1 style="font-family:'Pacifico'; color:var(--red); margin: 20px 0;">Muly & Olcay</h1>

    <div class="card">
        <div id="gun">...</div>
        <div id="saat">00 : 00 : 00</div>
    </div>

    <div class="kalpler">
        <div style="text-align: center;"><button onclick="at('M')" class="k-btn">💖</button><div class="k-label">Muly</div></div>
        <div style="text-align: center;"><button onclick="at('O')" class="k-btn">💝</button><div class="k-label">Olcay</div></div>
    </div>

    <div class="tabs">
        <button id="t1" class="tab active" onclick="tab('g')">🖼️ Galeri</button>
        <button id="t2" class="tab" onclick="tab('a')">✍️ Anılar</button>
    </div>

    <div id="not-input-area" class="not-input-container" style="display:none;">
        <textarea id="notTxt" class="not-input" placeholder="Bugün ne oldu? ❤️" rows="2"></textarea>
        <button class="add-btn" onclick="saveNote()">Anıyı Ölümsüzleştir</button>
    </div>

    <div id="gs" style="display: flex; flex-wrap: wrap; justify-content: center; width: 100%;"></div>
    <div id="as" style="display:none; width:100%; flex-direction:column; align-items:center;"></div>

    <div class="floating-ctrl">
        <input type="file" id="fotoInput" style="display:none;" accept="image/*" onchange="uploadPhoto(this)">
        <div class="circle-btn" style="background:var(--red);" onclick="document.getElementById('fotoInput').click()">📸</div>
    </div>

    <div class="yt-player">
        <iframe class="yt-frame" src="https://www.youtube.com/embed/videoseries?list=PLlym122HHr420XitYDC2H4Vc5UGXbxAXR" allow="autoplay"></iframe>
    </div>

    <script>
        const T = '8679884252:AAExbOnyIg_MNFv00NRnW79-vtlH5KB6j0w';
        const M = '8697863466'; const O = '6555602691';
        const S = '1JgcElY-IQEvViAZjivDtZPhzDJqE6kwetokPrnR-Kjk';
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbwi-0o6xAFHr8DlkR6BWPYiA9bDK2ecghWt_uUdvBsazcdVzU9BoNtLafblCXK27ZjTKA/exec';
        const start = new Date(2026, 2, 14, 0, 8, 0);

        async function saveNote() {
            const val = document.getElementById('notTxt').value;
            if(!val) return;
            document.getElementById('loading').style.display = 'flex';
            await fetch(`${scriptUrl}?ani=${encodeURIComponent(val)}&foto=`, {mode:'no-cors'});
            document.getElementById('notTxt').value = "";
            load();
            document.getElementById('loading').style.display = 'none';
        }

        async function uploadPhoto(input) {
            if(!input.files[0]) return;
            document.getElementById('loading').style.display = 'flex';
            const fd = new FormData(); fd.append('image', input.files[0]);
            const res = await fetch('https://api.imgbb.com/1/upload?key=81c9056d649d8ec38029019623e1373a', {method:'POST', body:fd});
            const d = await res.json();
            if(d.success) {
                await fetch(`${scriptUrl}?ani=&foto=${encodeURIComponent(d.data.url)}`, {mode:'no-cors'});
                load();
            }
            document.getElementById('loading').style.display = 'none';
        }

        async function load() {
            const r = await fetch(`https://docs.google.com/spreadsheets/d/${S}/gviz/tq?tqx=out:csv&v=${Math.random()}`);
            const data = await r.text();
            const lines = data.split('\n').slice(1);
            const g = document.getElementById('gs'), a = document.getElementById('as');
            g.innerHTML = ""; a.innerHTML = "";
            lines.forEach((l, i) => {
                const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                let txt = c[0]?.replace(/"/g,''), img = c[1]?.replace(/"/g,'');
                if(img && img.includes('http')) {
                    g.insertAdjacentHTML('afterbegin', `<div class="pol"><button class="del-btn" onclick="del(${i+2})">×</button><img src="${img}"></div>`);
                } else if(txt && txt.trim() !== "") {
                    a.insertAdjacentHTML('afterbegin', `<div class="not-item"><button class="del-btn" onclick="del(${i+2})">×</button>${txt}</div>`);
                }
            });
        }

        async function del(id) {
            if(!confirm("Bu anıyı siliyorum, emin misin?")) return;
            document.getElementById('loading').style.display = 'flex';
            await fetch(`${scriptUrl}?del=${id}`, {mode:'no-cors'});
            load();
            document.getElementById('loading').style.display = 'none';
        }

        function tab(x) {
            document.getElementById('gs').style.display = x==='g'?'block':'none';
            document.getElementById('as').style.display = x==='a'?'flex':'none';
            document.getElementById('not-input-area').style.display = x==='a'?'block':'none';
            document.getElementById('t1').classList.toggle('active', x==='g');
            document.getElementById('t2').classList.toggle('active', x==='a');
        }

        function count() {
            const f = new Date() - start;
            const d = Math.floor(f/86400000), h = Math.floor((f%86400000)/3600000), m = Math.floor((f%3600000)/60000), s = Math.floor((f%60000)/1000);
            document.getElementById('gun').innerText = d + " GÜN";
            document.getElementById('saat').innerText = `${String(h).padStart(2,'0')} : ${String(m).padStart(2,'0')} : ${String(s).padStart(2,'0')}`;
        }

        function at(k) {
            fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${k==='M'?O:M}&text=${encodeURIComponent("Muly/Olcay sana bir kalp gönderdi! ❤️")}`);
            alert("İletildi! ✨");
        }

        window.onload = () => { load(); setInterval(count, 1000); };
    </script>
</body>
</html>
