<script>
    const IMGBB_API_KEY = '5767fb3279ed0b1f20bf5beab37300d4';
    const tanismaTarihi = new Date(2026, 2, 14, 0, 8, 0);

    // 1. Sayfa yüklenince eski fotoğrafları hafızadan çek
    window.onload = function() {
        const kaydedilenFotolar = JSON.parse(localStorage.getItem('bizimFotolar') || '[]');
        kaydedilenFotolar.forEach(foto => {
            eklePolaroid(foto.url, foto.tarih, false);
        });
        guncelle();
        verileriGetir();
    };

    function guncelle() {
        const simdi = new Date();
        const fark = simdi.getTime() - tanismaTarihi.getTime();
        const gun = Math.floor(fark / (1000 * 60 * 60 * 24));
        const saat = String(Math.floor((fark % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
        const dakika = String(Math.floor((fark % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
        const saniye = String(Math.floor((fark % (1000 * 60)) / 1000)).padStart(2, '0');
        document.getElementById('gun').innerText = gun + " GÜN";
        document.getElementById('saat-dakika-saniye').innerText = `${saat} : ${dakika} : ${saniye}`;
    }
    setInterval(guncelle, 1000);

    async function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const status = document.getElementById('uploadStatus');
        status.style.display = 'block'; status.innerText = "Yükleniyor... ✨";
        
        const formData = new FormData();
        formData.append('image', file);

        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.success) {
                const yeniFotoUrl = result.data.url;
                const tarih = "Yeni Anı ❤️";
                
                // Sayfaya ekle
                eklePolaroid(yeniFotoUrl, tarih, true);
                
                status.innerText = "Yüklendi! ❤️";
                setTimeout(() => status.style.display = 'none', 3000);
            }
        } catch (e) { status.innerText = "Hata!"; }
    }

    function eklePolaroid(url, text, kaydet = true) {
        const container = document.getElementById('photo-container');
        const pol = document.createElement('div');
        pol.className = 'polaroid';
        pol.innerHTML = `<img src="${url}"><div style="font-family:'Pacifico'; font-size:0.75rem; text-align:center; margin-top:10px;">${text}</div>`;
        container.prepend(pol);

        // Hafızaya (LocalStorage) Kaydet
        if (kaydet) {
            const eskiFotolar = JSON.parse(localStorage.getItem('bizimFotolar') || '[]');
            eskiFotolar.push({url: url, tarih: text});
            localStorage.setItem('bizimFotolar', JSON.stringify(eskiFotolar));
        }
    }

    // Diğer fonksiyonlar (Telegram, Arka Plan vs.) aynı kalacak...
</script>
