<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonsuza Dek ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root { --ana-renk: #002d72; --vurgu: #fec10d; --kalp: #ff4d6d; --bg: #fff0f3; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .card { 
            background: white; padding: 25px; border-radius: 25px; text-align: center; 
            border: 4px solid var(--vurgu); box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 90%; max-width: 350px; margin-top: 20px; z-index: 10;
        }
        #gun-sayi { font-size: 3.5rem; font-weight: 800; color: var(--kalp); display: block; line-height: 1; }
        #saat-alani { font-size: 1.3rem; font-weight: 600; color: var(--ana-renk); margin-top: 10px; display: block; }

        .album { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin: 25px 0; width: 100%; }
        .polaroid { 
            background: white; padding: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            width: 140px; border-radius: 5px; position: relative; transition: 0.3s;
        }
        .polaroid img { width: 100%; height: 130px; object-fit: cover; border-radius: 3px; }
        
        /* Kontrol Butonları */
        .controls { display: flex; justify-content: space-around; margin-top: 8px; }
        .btn-mini { border: none; background: none; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .btn-mini:hover { transform: scale(1.2); }

        .ani-kutusu { background: white; margin: 10px 0; padding: 15px; border-radius: 15px; border-left: 5px solid var(--kalp); width: 90%; max-width: 350px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .ani-tarih { font-size: 0.75rem; color: #888; font-weight: 600; }
        .ani-metin { font-size: 0.95rem; color: var(--ana-renk); margin-top: 5px; }

        .btn-kalp { font-size: 4rem; background: none; border: none; cursor: pointer; }
        .btn-ekle { position: fixed; bottom: 20px; right: 20px; background: var(--kalp); color: white; width: 60px; height: 60px; border-radius: 50%; border: 3px solid white; font-size: 30px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

    <h1 style="font-family: 'Pacifico'; color: var(--kalp);">Bizim Hikayemiz</h1>

    <div class="card">
        <span id="gun-sayi">Yükleniyor...</span>
        <span id="saat-alani">00 : 00 : 00</span>
    </div>

    <div id="album-container" class="album"></div>

    <button onclick="kalpAt()" class="btn-kalp">❤️</button>
    <div id="bilgi" style="color: var(--kalp); font-weight: 600; margin-top: 10px; height: 20px;"></div>

    <div id="etablo-anilar" style="width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 20px;">
        <h3 style="color: var(--kalp); font-family: 'Pacifico';">Anı Defterimiz</h3>
    </div>

    <button class="btn-ekle" onclick="document.getElementById('resimSecici').click()">+</button>
    <input type="file" id="resimSecici" style="display: none;" accept="image/*" onchange="yukle(event)">

    <script>
        const API_KEY = '5767fb3279ed0b1f20bf5beab37300d4';
        const baslangic = new Date(2026, 2, 14, 0, 8, 0); 

        function sayac() {
            const fark = new Date() - baslangic;
            const d = Math.floor(fark / 86400000);
            const h = Math.floor((fark % 86400000) / 3600000);
            const m = Math.floor((fark % 3600000) / 60000);
            const s = Math.floor((fark % 60000) / 1000);
            document.getElementById('gun-sayi').innerText = d + " GÜN";
            document.getElementById('saat-alani').innerText = `${String(h).padStart(2,'0')} : ${String(m).padStart(2,'0')} : ${String(s).padStart(2,'0')}`;
        }
        setInterval(sayac, 1000); sayac();

        async function tabloyuGetir() {
            try {
                const sheetID = '1JgcElY-IQEvViAZjivDtZPhzDJqE6kwetokPrnR-Kjk';
                const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv`;
                const yanit = await fetch(url);
                const csv = await yanit.text();
                const satirlar = csv.split('\n').slice(1).reverse();
                const listeDiv = document.getElementById('etablo-anilar');
                satirlar.forEach(satir => {
                    const hucreler = satir.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(hucreler[0]) {
                        const anı = document.createElement('div');
                        anı.className = 'ani-kutusu';
                        anı.innerHTML = `<div class="ani-tarih">${hucreler[1].replace(/"/g,'')}</div><div class="ani-metin">${hucreler[0].replace(/"/g,'')}</div>`;
                        listeDiv.appendChild(anı);
                    }
                });
            } catch (e) {}
        }

        window.onload = () => {
            const fotolar = JSON.parse(localStorage.getItem('anı_listesi') || '[]');
            fotolar.forEach(url => bas(url));
            tabloyuGetir();
        };

        async function yukle(e) {
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById('bilgi').innerText = "Yükleniyor... ✨";
            const fd = new FormData(); fd.append('image', file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {method:'POST', body:fd});
                const data = await res.json();
                if(data.success) {
                    const url = data.data.url;
                    bas(url);
                    const liste = JSON.parse(localStorage.getItem('anı_listesi') || '[]');
                    liste.push(url);
                    localStorage.setItem('anı_listesi', JSON.stringify(liste));
                    document.getElementById('bilgi').innerText = "Anı eklendi! ❤️";
                    setTimeout(() => document.getElementById('bilgi').innerText = "", 2000);
                }
            } catch(e) { document.getElementById('bilgi').innerText = "Hata!"; }
        }

        function bas(url) {
            const container = document.getElementById('album-container');
            const d = document.createElement('div');
            d.className = 'polaroid';
            d.id = 'img-' + btoa(url).substring(0,10); // Benzersiz ID
            d.innerHTML = `
                <img src="${url}">
                <div class="controls">
                    <button class="btn-mini" onclick="indir('${url}')" title="İndir">💾</button>
                    <button class="btn-mini" onclick="sil('${url}')" title="Sil">🗑️</button>
                </div>
            `;
            container.prepend(d);
        }

        function sil(url) {
            if(confirm("Bu anıyı silmek istediğine emin misin?")) {
                // Ekrardan sil
                const id = 'img-' + btoa(url).substring(0,10);
                document.getElementById(id).remove();
                // Hafızadan sil
                let liste = JSON.parse(localStorage.getItem('anı_listesi') || '[]');
                liste = liste.filter(item => item !== url);
                localStorage.setItem('anı_listesi', JSON.stringify(liste));
            }
        }

        async function indir(url) {
            const image = await fetch(url);
            const imageBlog = await image.blob();
            const imageURL = URL.createObjectURL(imageBlog);
            const link = document.createElement('a');
            link.href = imageURL;
            link.download = 'bizim-animiz.jpg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function kalpAt() {
            fetch(`https://api.telegram.org/bot8679884252:AAExbOnyIg_MNFv00NRnW79-vtlH5KB6j0w/sendMessage?chat_id=6555602691&text=Sana bir kalp gönderdi! ❤️`);
            document.getElementById('bilgi').innerText = "Kalbini gönderdin! ❤️";
            setTimeout(() => document.getElementById('bilgi').innerText = "", 3000);
        }
    </script>
</body>
</html>
