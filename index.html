<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muly ❤️ Olcay</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Pacifico&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ana-renk: #002d72; --vurgu: #fec10d; --kalp: #ff4d6d; --bg: #fff0f3; --romantik: #7209b7; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Sayaç Kartı */
        .card { background: white; padding: 30px 20px; border-radius: 30px; text-align: center; border: 2px solid rgba(255, 77, 109, 0.2); width: 90%; max-width: 380px; margin-top: 10px; box-shadow: 0 15px 35px rgba(255, 77, 109, 0.15); position: relative; }
        .card::before { content: '♾️'; position: absolute; top: -15px; background: var(--bg); padding: 0 10px; color: var(--kalp); font-size: 1.5rem; left: 50%; transform: translateX(-50%); }

        .sayac-baslik { font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: var(--romantik); margin-bottom: 10px; }
        #gun-sayi { font-size: 3.5rem; font-weight: 800; color: var(--kalp); display: block; line-height: 1; }
        #saat-alani { font-size: 1.4rem; font-weight: 600; color: var(--ana-renk); display: block; margin-top: 12px; letter-spacing: 2px; }
        .sonsuzluk-metni { font-family: 'Dancing Script', cursive; font-size: 1.4rem; color: var(--kalp); margin-top: 15px; animation: nefes 3s infinite ease-in-out; }

        @keyframes nefes { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.08); opacity: 1; } }

        /* Sekmeler */
        .tab-container { display: flex; gap: 10px; margin: 25px 0; width: 100%; max-width: 350px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 20px; background: white; color: var(--ana-renk); font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 0.85rem; }
        .tab-btn.active { background: var(--kalp); color: white; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3); }

        /* İçerik */
        .content-section { display: none; width: 100%; animation: fadeIn 0.5s ease; }
        .content-section.active { display: flex; flex-direction: column; align-items: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .album { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; width: 100%; }
        .polaroid { background: white; padding: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 145px; border-radius: 5px; transform: rotate(-1.5deg); text-align: center; border: 1px solid #ffe5ec; }
        .polaroid img { width: 100%; height: 135px; object-fit: cover; border-radius: 3px; }
        
        .ani-kutusu { background: white; margin: 12px 0; padding: 18px; border-radius: 20px; border-right: 4px solid var(--vurgu); border-left: 4px solid var(--kalp); width: 90%; max-width: 360px; text-align: left; }

        /* SÜSLÜ KALP BÖLÜMÜ */
        .kalp-bolumu { display: flex; gap: 40px; align-items: center; justify-content: center; margin: 25px 0; }
        .kalp-konteynir { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .kalp-etiket { font-family: 'Pacifico', cursive; font-size: 0.9rem; color: var(--romantik); text-shadow: 1px 1px 2px rgba(0,0,0,0.05); }
        
        .btn-kalp-suslu { 
            font-size: 3.8rem; background: none; border: none; cursor: pointer; 
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            filter: drop-shadow(0 8px 15px rgba(255, 77, 109, 0.3));
            position: relative;
        }
        .btn-kalp-suslu:hover { transform: scale(1.3) rotate(8deg); }
        .btn-kalp-suslu:active { transform: scale(0.9); }

        .btn-ekle { position: fixed; bottom: 25px; right: 25px; background: var(--kalp); color: white; width: 65px; height: 65px; border-radius: 50%; border: 4px solid white; font-size: 35px; cursor: pointer; z-index: 100; box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4); }
        #bilgi { color: var(--kalp); font-weight: 600; margin-top: 10px; height: 25px; font-style: italic; text-align: center; font-size: 0.9rem; }

        @media (max-width: 400px) {
            #gun-sayi { font-size: 2.8rem; }
            #saat-alani { font-size: 1.1rem; }
            .polaroid { width: 130px; }
            .kalp-bolumu { gap: 25px; }
        }
    </style>
</head>
<body>

    <h1 style="font-family: 'Pacifico'; color: var(--kalp); margin-top: 10px; font-weight: normal;">İyi ki Varsın...</h1>

    <div class="card">
        <div class="sayac-baslik">Aşkımız Başlayalı;</div>
        <span id="gun-sayi">Yükleniyor...</span>
        <span id="saat-alani">00 : 00 : 00</span>
        <div class="sonsuzluk-metni">Sonsuza dek sürecek bir AŞK... ✨</div>
    </div>

    <div class="tab-container">
        <button id="btn-galeri" class="tab-btn active" onclick="tabDegistir('galeri')">🖼️ Fotoğraflarımız</button>
        <button id="btn-anilar" class="tab-btn" onclick="tabDegistir('anilar')">✍️ Anılarımız</button>
    </div>

    <div id="galeri-section" class="content-section active">
        <div id="album-container" class="album"></div>
    </div>

    <div id="anilar-section" class="content-section">
        <div id="etablo-anilar" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    </div>

    <div class="kalp-bolumu">
        <div class="kalp-konteynir">
            <span class="kalp-etiket">Muly'nin Kalbi</span>
            <button onclick="kalpAt('Muly')" class="btn-kalp-suslu">💖</button>
        </div>
        <div class="kalp-konteynir">
            <span class="kalp-etiket">Olcay'ın Kalbi</span>
            <button onclick="kalpAt('Olcay')" class="btn-kalp-suslu">💝</button>
        </div>
    </div>

    <div id="bilgi"></div>

    <button class="btn-ekle" onclick="document.getElementById('resimSecici').click()">+</button>
    <input type="file" id="resimSecici" style="display: none;" accept="image/*" onchange="yukle(event)">

    <script>
        const BOT_TOKEN = '8679884252:AAExbOnyIg_MNFv00NRnW79-vtlH5KB6j0w';
        const MY_ID = '6555602691'; // Olcay'ın ID'si
        const ONUN_ID = '8697863466'; // Muly'nin ID'si (GÜNCELLENDİ)
        const API_KEY = '5767fb3279ed0b1f20bf5beab37300d4';
        const SHEET_ID = '1JgcElY-IQEvViAZjivDtZPhzDJqE6kwetokPrnR-Kjk';
        const baslangic = new Date(2026, 2, 14, 0, 8, 0);

        function tabDegistir(tab) {
            document.getElementById('galeri-section').style.display = (tab === 'galeri') ? 'flex' : 'none';
            document.getElementById('anilar-section').style.display = (tab === 'anilar') ? 'flex' : 'none';
            document.getElementById('btn-galeri').classList.toggle('active', tab === 'galeri');
            document.getElementById('btn-anilar').classList.toggle('active', tab === 'anilar');
        }

        function sayac() {
            const fark = new Date() - baslangic;
            const d = Math.floor(fark / 86400000);
            const h = Math.floor((fark % 86400000) / 3600000);
            const m = Math.floor((fark % 3600000) / 60000);
            const s = Math.floor((fark % 60000) / 1000);
            document.getElementById('gun-sayi').innerText = d + " GÜN";
            document.getElementById('saat-alani').innerText = `${String(h).padStart(2,'0')} : ${String(m).padStart(2,'0')} : ${String(s).padStart(2,'0')}`;
        }
        setInterval(sayac, 1000); sayac();

        async function verileriGetir() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&cb=${Math.random()}`;
                const yanit = await fetch(url);
                const csv = await yanit.text();
                const satirlar = csv.split('\n').slice(1);
                const albumDiv = document.getElementById('album-container');
                const listeDiv = document.getElementById('etablo-anilar');
                albumDiv.innerHTML = ""; listeDiv.innerHTML = "";
                satirlar.forEach(satir => {
                    const hucreler = satir.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    let ani = hucreler[0]?.replace(/"/g,'').trim();
                    let foto = hucreler[1]?.replace(/"/g,'').trim();
                    let tarih = hucreler[2]?.replace(/"/g,'').trim() || "";
                    if(foto && foto.includes('http')) { 
                        albumDiv.insertAdjacentHTML('afterbegin', `<div class="polaroid"><img src="${foto}" onclick="window.open('${foto}')"></div>`);
                    } 
                    if(ani && !ani.includes('http')) {
                        listeDiv.insertAdjacentHTML('afterbegin', `<div class="ani-kutusu"><div style="font-size:0.75rem; color:var(--kalp); font-weight:bold;">✨ ${tarih}</div><div>${ani}</div></div>`);
                    }
                });
            } catch(e) {}
        }
        window.onload = verileriGetir;

        async function yukle(e) {
            const cevap = prompt("Şifre: Olcay mı yoksa sen mi daha çok seviyorsun?");
            if (cevap?.toLowerCase().trim() !== "olcay") return;
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById('bilgi').innerText = "Anımız yükleniyor... ❤️";
            const fd = new FormData(); fd.append('image', file);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {method:'POST', body:fd});
            const data = await res.json();
            if(data.success) {
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${MY_ID}&text=${encodeURIComponent('📸 Olcay, yeni bir fotoğraf geldi: ' + data.data.url)}`);
                document.getElementById('bilgi').innerText = "Anı başarıyla gönderildi! ❤️";
            }
        }

        function kalpAt(kim) {
            let hedefID;
            let mesaj;

            if (kim === 'Muly') {
                hedefID = MY_ID;
                mesaj = "Olcay, Muly seni çok özledi! ❤️";
            } else {
                hedefID = ONUN_ID;
                mesaj = "Muly, Olcay'ın yine aklındasın 💝 Pardon, ne zaman çıktın ki?";
            }

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${hedefID}&text=${encodeURIComponent(mesaj)}`);
            document.getElementById('bilgi').innerText = "Sevgini gönderdin! ❤️";
            setTimeout(() => document.getElementById('bilgi').innerText = "", 2500);
        }
    </script>
</body>
</html>
