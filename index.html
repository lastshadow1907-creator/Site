<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muly ❤️ Olcay</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #4a4a4a;
            padding-bottom: 100px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            width: 90%;
            max-width: 350px;
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #gun { font-size: 3rem; font-weight: 800; color: #ff4757; }
        
        /* Kalpler ve Yazılar */
        .kalpler { display: flex; gap: 40px; margin: 20px 0; }
        .k-box { text-align: center; cursor: pointer; transition: 0.3s; }
        .k-box:active { transform: scale(1.2); }
        .k-text { font-family: 'Dancing Script', cursive; font-size: 1.2rem; color: white; font-weight: bold; }

        /* Polaroid Galeri */
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; width: 100%; margin-top: 20px; }
        .pol {
            background: white;
            padding: 10px 10px 25px 10px;
            width: 100px;
            margin: 10px;
            transform: rotate(-3deg);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
        }
        .pol img { width: 100%; height: 100px; object-fit: cover; }
        .del-btn {
            position: absolute; top: -5px; right: -5px;
            background: #ff4757; color: white; border: none;
            border-radius: 50%; width: 22px; height: 22px; cursor: pointer;
        }

        /* Kontrol Butonları */
        .music-ctrl {
            position: fixed; bottom: 20px; left: 20px;
            background: white; border: 2px solid #ff758c;
            padding: 10px 15px; border-radius: 50px; cursor: pointer;
            font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .upload-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: #ff4757; color: white; border: none;
            width: 60px; height: 60px; border-radius: 50%;
            font-size: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #loading {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.8); z-index: 9999;
            color: white; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="loading">İşleniyor... ❤️</div>

    <h1 style="font-family: 'Pacifico'; color: white; margin-top: 20px;">Muly & Olcay</h1>

    <div class="card">
        <div id="gun">...</div>
        <div id="saat" style="font-weight: bold; color: #ff758c;">00:00:00</div>
    </div>

    <div class="kalpler">
        <div class="k-box" onclick="sendHeart('M')">
            <div style="font-size: 3.5rem;">💖</div>
            <div class="k-text">Muly</div>
        </div>
        <div class="k-box" onclick="sendHeart('O')">
            <div style="font-size: 3.5rem;">💝</div>
            <div class="k-text">Olcay</div>
        </div>
    </div>

    <div class="gallery" id="gallery"></div>

    <audio id="mySong" src="https://files.catbox.moe/bkrabb.mp3" loop></audio>
    <div class="music-ctrl" onclick="toggleMusic()" id="musicBtn">🎵 Müziği Başlat</div>

    <input type="file" id="fotoInput" style="display:none;" accept="image/*" onchange="uploadPhoto(this)">
    <button class="upload-btn" onclick="document.getElementById('fotoInput').click()">📸</button>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwi-0o6xAFHr8DlkR6BWPYiA9bDK2ecghWt_uUdvBsazcdVzU9BoNtLafblCXK27ZjTKA/exec';
        const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/1JgcElY-IQEvViAZjivDtZPhzDJqE6kwetokPrnR-Kjk/gviz/tq?tqx=out:csv';
        const IMBB_KEY = '81c9056d649d8ec38029019623e1373a';
        const START_DATE = new Date(2026, 2, 14, 0, 8, 0);

        function toggleMusic() {
            const m = document.getElementById('mySong');
            const btn = document.getElementById('musicBtn');
            if (m.paused) {
                m.play();
                btn.innerText = "⏸ Müziği Durdur";
            } else {
                m.pause();
                btn.innerText = "▶ Müziği Oynat";
            }
        }

        async function uploadPhoto(input) {
            if (!input.files[0]) return;
            const loader = document.getElementById('loading');
            loader.style.display = 'flex';

            const formData = new FormData();
            formData.append('image', input.files[0]);

            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMBB_KEY}`, { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.success) {
                    await fetch(`${SCRIPT_URL}?ani=&foto=${encodeURIComponent(data.data.url)}`, { mode: 'no-cors' });
                    alert("Fotoğraf anılara eklendi! ✨");
                    loadGallery();
                } else {
                    alert("Yükleme hatası: Servis yanıt vermedi.");
                }
            } catch (e) {
                alert("Hata oluştu! Bağlantını kontrol et.");
            } finally {
                loader.style.display = 'none';
            }
        }

        async function loadGallery() {
            try {
                const r = await fetch(SHEET_CSV + '&v=' + Math.random());
                const data = await r.text();
                const lines = data.split('\n').slice(1);
                const g = document.getElementById('gallery');
                g.innerHTML = "";
                
                lines.forEach((l, index) => {
                    const cols = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const img = cols[1]?.replace(/"/g, '');
                    if (img && img.includes('http')) {
                        g.insertAdjacentHTML('afterbegin', `
                            <div class="pol">
                                <button class="del-btn" onclick="deleteItem(${index + 2})">×</button>
                                <img src="${img}">
                            </div>
                        `);
                    }
                });
            } catch (e) {}
        }

        async function deleteItem(id) {
            if (!confirm("Siliyorum?")) return;
            document.getElementById('loading').style.display = 'flex';
            await fetch(`${SCRIPT_URL}?del=${id}`, { mode: 'no-cors' });
            loadGallery();
            document.getElementById('loading').style.display = 'none';
        }

        function sendHeart(k) {
            alert("Kalp gönderildi! ❤️");
            const target = (k === 'M') ? '6555602691' : '8697863466';
            const msg = (k === 'M') ? "Muly sana kalp gönderdi! ❤️" : "Olcay seni düşünüyor! 💝";
            fetch(`https://api.telegram.org/bot8679884252:AAExbOnyIg_MNFv00NRnW79-vtlH5KB6j0w/sendMessage?chat_id=${target}&text=${encodeURIComponent(msg)}`);
        }

        function count() {
            const now = new Date();
            const diff = now - START_DATE;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('gun').innerText = d + " GÜN";
            document.getElementById('saat').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        setInterval(count, 1000);
        window.onload = loadGallery;
    </script>
</body>
</html>
